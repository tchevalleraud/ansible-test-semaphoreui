---
- name: Bootstrap - Activer OpenAPI via SSH
  hosts: all
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    ansible_network_os: community.network.voss
    ansible_user: "rwa"
    ansible_password: "rwa"
    ansible_become: true
    ansible_become_method: enable
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1
      -o HostKeyAlgorithms=+ssh-rsa
      -o PubkeyAuthentication=no

  tasks:
    - name: Vérifier si OpenAPI est déjà actif
      community.network.voss_command:
        commands:
          - show application openapi
      register: openapi_state
      ignore_errors: true

    - name: Activer OpenAPI local-mgmt
      community.network.voss_config:
        parents:
          - application
        lines:
          - openapi local-mgmt enable
        save_when: modified
      when: >
        openapi_state.stdout is not defined
        or 'enable' not in (openapi_state.stdout[0] | default('') | lower)

    - name: Confirmer que le port 9443 répond
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 9443
        timeout: 30
      delegate_to: localhost
      vars:
        ansible_connection: local