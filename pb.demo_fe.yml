- name: Display Netbox
  hosts: all
  gather_facts: false

  tasks:
    - name: Display device hostname
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} - {{ ansible_host | default('N/A') }}"

- name: Display device names from NetBox inventory
  hosts: all
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    ansible_network_os: voss
    ansible_user: "rwa"
    ansible_password: "rwa"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1
      -o HostKeyAlgorithms=+ssh-rsa
      -o PubkeyAuthentication=no

  tasks:
    - name: Activate OpenAPI
      extreme.fe.extreme_fe_command:
        commands:
          - "enable"
          - "conf t"
          - "application"
          - "openapi local-mgmt enable"
          - "exit"
    
    - name: Save running configuration
      extreme.fe.extreme_fe_save_config:
        verbose: false