- name: Debug info Ansible
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Affiche les variables NetBox
      debug:
        msg: "NetBox URL={{ netbox_url }} ; Token={{ netbox_token }}"

- name: Run XIQ-SE Workflow
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Run workflow WF_TEST1
      extreme_community.xiqse.xiqse_workflow:
        path: "/Workflows/WF_TEST1"
        variables:
          deviceIP: "10.201.100.41"
          devices:
            - "10.201.100.41"
        wait: true
        provider:
          host: "{{ xiqse_host }}"
          client_id: "{{ xiqse_client }}"
          client_secret: "{{ xiqse_secret }}"
          verify: "{{ xiqse_verify }}"
    - name: Run workflow WF_TEST2
      extreme_community.xiqse.xiqse_workflow:
        path: "/Workflows/WF_TEST2"
        variables:
          deviceIP: "10.201.100.41"
          devices:
            - "10.201.100.41"
        wait: true
        provider:
          host: "{{ xiqse_host }}"
          client_id: "{{ xiqse_client }}"
          client_secret: "{{ xiqse_secret }}"
          verify: "{{ xiqse_verify }}"